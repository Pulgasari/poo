<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Sprache – Live Compiler</title>
    <style>
        body { font-family: monospace; display: flex; gap: 20px; padding: 20px; background: #1e1e2e; color: #cdd6f4; }
        .col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        textarea { flex: 1; background: #313244; color: #cdd6f4; border: none; padding: 10px; font-size: 14px; border-radius: 8px; resize: vertical; }
        button { background: #89b4fa; color: #1e1e2e; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #b4befe; }
        #output { background: #313244; padding: 10px; border-radius: 8px; min-height: 100px; white-space: pre-wrap; overflow: auto; }
        .badge { background: #585b70; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>

<div class="col">
    <h2>📝 Dein Code</h2>
    <textarea id="source" rows="15">println("Hallo, Browser-Welt!");</textarea>
    <div style="display: flex; gap: 10px;">
        <button id="compileBtn">🚀 Kompilieren & Ausführen (Browser)</button>
        <button id="downloadBtn">⬇️ Download (Odin/Deno)</button>
    </div>
    <div>
        Ziel: <select id="targetSelect">
            <option value="browser">🌐 Browser (Live)</option>
            <option value="deno">🦕 Deno (Server)</option>
            <option value="odin">⚙️ Odin (Desktop)</option>
        </select>
    </div>
</div>

<div class="col">
    <h2>📤 Ausgabe <span class="badge" id="cacheBadge">⚡</span></h2>
    <div id="output">Warte auf Kompilierung...</div>
    <div style="font-size: 12px; color: #a6adc8;">
        <span id="status">Bereit</span>
    </div>
</div>

<script type="module">
    // Hauptthread: Steuert den Worker und führt den generierten Code aus
    import { hashSource, getCachedCode, setCachedCode } from './cache.js';

    const sourceEl = document.getElementById('source');
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');
    const compileBtn = document.getElementById('compileBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const targetSelect = document.getElementById('targetSelect');
    const cacheBadge = document.getElementById('cacheBadge');

    // Worker starten
    const worker = new Worker('./compiler.worker.js', { type: 'classic' });

    // Funktion zum Ausführen des generierten Browser-Codes
    function executeBrowserCode(code) {
        try {
            // Erstelle einen Blob-URL, um den Code in einem sauberen Scope auszuführen
            const blob = new Blob([code], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            
            // Dynamisch importieren (gibt uns Modul-Scope)
            import(url).then(module => {
                outputEl.textContent = '✅ Code erfolgreich ausgeführt! (Siehe Console für Logs)';
                statusEl.textContent = '✅ Ausgeführt über: ' + url;
            }).catch(err => {
                outputEl.textContent = '❌ Fehler bei Ausführung:\n' + err.stack;
                statusEl.textContent = '❌ Fehler';
            }).finally(() => {
                // URL nach 1s freigeben
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            });
        } catch (e) {
            outputEl.textContent = '❌ Ausführungsfehler:\n' + e.stack;
        }
    }

    // Worker-Nachrichten empfangen
    worker.onmessage = (event) => {
        const data = event.data;
        if (data.type === 'success') {
            const code = data.code;
            const fromCache = data.fromCache;
            const target = data.target;

            cacheBadge.textContent = fromCache ? '💾 Cache' : '🆕 Neu kompiliert';

            // Zeige den generierten Code im Output
            outputEl.textContent = `// Generierter Code (${target})\n${code}`;
            statusEl.textContent = `✅ Kompiliert für ${target} (${fromCache ? 'Cached' : 'Frisch'})`;

            // Wenn Ziel = Browser, führe den Code sofort aus
            if (target === 'browser') {
                executeBrowserCode(code);
            } else {
                statusEl.textContent = `✅ Code für ${target} generiert. Klick auf Download!`;
            }
        } else if (data.type === 'error') {
            outputEl.textContent = '❌ Compiler-Fehler:\n' + data.message;
            statusEl.textContent = '❌ Fehler';
        }
    };

    // Kompilieren starten
    function compileAndRun() {
        const source = sourceEl.value;
        const target = targetSelect.value;
        if (!source.trim()) {
            outputEl.textContent = 'Bitte gib Code ein.';
            return;
        }

        outputEl.textContent = '⏳ Kompiliere...';
        statusEl.textContent = '⏳ Worker läuft...';

        worker.postMessage({
            action: 'compile',
            source: source,
            target: target
        });
    }

    // Download für Odin/Deno
    function downloadCode() {
        const code = outputEl.textContent;
        if (!code || code.startsWith('// Generierter Code') === false) {
            alert('Bitte kompiliere zuerst (Odin oder Deno Ziel auswählen).');
            return;
        }
        const target = targetSelect.value;
        const ext = target === 'odin' ? 'odin' : (target === 'deno' ? 'ts' : 'js');
        const blob = new Blob([code], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `output.${ext}`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // Event-Listener
    compileBtn.addEventListener('click', compileAndRun);
    downloadBtn.addEventListener('click', downloadCode);

    // Bei Start: Einmal kompilieren
    setTimeout(compileAndRun, 100);

    // Tastenkürzel: Strg+Enter kompiliert
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            compileAndRun();
        }
    });
</script>
</body>
  </html>
