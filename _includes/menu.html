<!-- Das Menü als HTML + JS -->
<div id="app"></div>

<!-- ========================================== -->
<!-- MENÜ (HTML + CSS + JS)                     -->
<!-- ========================================== -->

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .sticky-top {
        position: sticky;
        top: 0;
        background: #24292e;
        color: white;
        padding: 12px 20px;
        z-index: 1000;
    }
    .menu-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .menu-items a {
        color: white;
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 6px;
    }
    .menu-items a:hover {
        background: rgba(255,255,255,0.1);
    }
    .menu-items a.active {
        background: rgba(255,255,255,0.2);
        font-weight: bold;
    }
</style>

<nav class="sticky-top">
    <div class="menu-container">
        <div class="menu-brand">📘 Mein Projekt</div>
        <div class="menu-items">
            <a href="{{ "/" | relative_url }}">Home</a>
            <a href="{{ "/docs/seite1" | relative_url }}">Seite 1</a>
            <a href="{{ "/docs/seite2" | relative_url }}">Seite 2</a>
            <!-- Weitere Links... -->
        </div>
    </div>
</nav>

<script type="module">
  import { h, render } from 'https://cdn.jsdelivr.net/npm/preact@10.19.3/+esm';
import { signal } from 'https://cdn.jsdelivr.net/npm/@preact/signals-core@1.5.0/+esm';
import htm from 'https://cdn.jsdelivr.net/npm/htm@3.1.1/+esm';

const html = htm.bind(h);

const menuItems = signal([
  { label: 'Home', href: '/' },
  { label: 'Docs', href: '/docs/' },
  { label: 'API', href: '/api/' },
]);

function Menu() {
  return html`
    <nav class="sticky-top">
      <div class="menu-container">
        <div class="menu-brand">📘 Mein Projekt</div>
        <div class="menu-items">
          ${menuItems.value.map(item => 
            html`<a href="${item.href}">${item.label}</a>`
          )}
        </div>
      </div>
    </nav>
  `;
}

const container = document.createElement('div');
document.body.prepend(container);
render(html`<${Menu} />`, container);

// CSS (wie gehabt)
const style = document.createElement('style');
style.textContent = `body { background: yellow;} `;
document.head.appendChild(style);
alert('moin from preact!');
</script>
<script>
  alert('moin from menu.html 2!');
</script>
