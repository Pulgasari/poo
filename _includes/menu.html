const app = {};
app.name = 'POO';

hljs.registerLanguage('poo', function (hljs) {
  return {
    name: "Poo",
    case_insensitive: false,
    keywords: {
      keyword: "as|and|break|catch|continue|cpy|do|fail|fn|if|kill|loop|in|new|obj|or|pkg|ref|return|skip|static|switch|use|val|yield",
      literal: "false|null|true|undefined",
      built_in: "Array|Blob|Bool|Char|Color|Date|Enum|Generator|List|Map|Number|Queue|Pattern|Record|RegExp|Set|Stack|String|Store|Symbol|Tree|Tuple|Union"
    },
    contains: [
      hljs.COMMENT('//', '$'),
      {
        className: 'string',
        begin: '"', end: '"',
        contains: [hljs.BACKSLASH_ESCAPE]
      },
      {
        className: 'string',
        begin: "'", end: "'",
        contains: [hljs.BACKSLASH_ESCAPE]
      },
      {
        className: 'string',
        begin: '`', end: '`',
        contains: [hljs.BACKSLASH_ESCAPE]
      },
      {
        className: 'number',
        begin: '0[xX][0-9a-fA-F_]+|0[bB][01_]+|\\d[\\d_]*\\.\\d[\\d_]*(?:[eE][+-]?\\d+)?|\\d[\\d_]*'
      },
      {
        className: 'operator',
        begin: '\\?\\?=|~==|===|!==|<=>|>>>|>=<|\\+=|-=|\\*=|/=|#=|~=|==|!=|=<|>=|\\|\\||&&|\\?\\?|>>|\\|\\?|\\|>|\\|\\.|=|<|>|\\+|-|\\*|/|%'
      }
    ]
  };
});

const menuItems = signal([
  { label: 'Home'    , href: '/'      },
  { label: 'Docs'    , href: '/docs/' },
  { label: '@GitHub' , href: 'https://github.com/pulgasari/poo/' },
]);

function Menu() {
  return html`
    <nav class="sticky-top">
      <div class="menu-container">
        <div class="menu-brand">${app.name}</div>
        <div class="menu-items">
          ${menuItems.value.map(item => 
            html`<a href="${item.href}">${item.label}</a>`
          )}
        </div>
      </div>
    </nav>
  `;
}
