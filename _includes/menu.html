<!-- Das Menü als HTML + JS -->
<div id="app"></div>

<!-- ========================================== -->
<!-- MENÜ (HTML + CSS + JS)                     -->
<!-- ========================================== -->

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .sticky-top {
        position: sticky;
        top: 0;
        background: #24292e;
        color: white;
        padding: 12px 20px;
        z-index: 1000;
    }
    .menu-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .menu-items a {
        color: white;
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 6px;
    }
    .menu-items a:hover {
        background: rgba(255,255,255,0.1);
    }
    .menu-items a.active {
        background: rgba(255,255,255,0.2);
        font-weight: bold;
    }
</style>

<script type="module">
   
import { h, render } from 'https://cdn.jsdelivr.net/npm/preact@10.19.3/+esm';
import { signal }    from 'https://cdn.jsdelivr.net/npm/@preact/signals-core@1.5.0/+esm';
import htm           from 'https://cdn.jsdelivr.net/npm/htm@3.1.1/+esm'; const html = htm.bind(h);
import { marked } from 'https://cdn.jsdelivr.net/npm/marked@11.0.0/+esm';
import hljs from 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/+esm';
   
const app = {};
app.name = 'POO';

hljs.registerLanguage('meineSprache', function(hljs) {
   return {
      name: 'Poo',
      // Regex für Schlüsselwörter (case-insensitive)
      keywords: {
         keyword  : 'break|loop|val|if|else|while|for|return|func|var|const',
         literal  : 'true|false|null|undefined',
         built_in : 'print|len|typeof'
        },
        // Regex für Kommentare
        contains: [
            hljs.COMMENT('//', '$'),
            hljs.COMMENT('/\\*', '\\*/'),
            {
                className: 'string',
                begin: '"', end: '"',
                contains: [hljs.BACKSLASH_ESCAPE]
            },
            {
                className: 'string',
                begin: "'", end: "'",
                contains: [hljs.BACKSLASH_ESCAPE]
            },
            {
                className: 'number',
                begin: '\\b\\d+(\\.\\d+)?\\b'
            },
            {
                className: 'operator',
                begin: '\\+\\+|--|\\+|-|\\*|/|%|==|!=|<=|>=|<|>|&&|\\|\\||!'
            }
        ]
    };
});

const menuItems = signal([
  { label: 'Home'    , href: '/'      },
  { label: 'Docs'    , href: '/docs/' },
  { label: '@GitHub' , href: 'https://github.com/pulgasari/poo/' },
]);

function Menu() {
  return html`
    <nav class="sticky-top">
      <div class="menu-container">
        <div class="menu-brand">${app.name}</div>
        <div class="menu-items">
          ${menuItems.value.map(item => 
            html`<a href="${item.href}">${item.label}</a>`
          )}
        </div>
      </div>
    </nav>
  `;
}

const container = document.createElement('div');
document.body.prepend(container);
render(html`<${Menu} />`, container);

*/
//alert('moin from preact!');
</script>
